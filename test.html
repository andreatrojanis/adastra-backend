<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>START ON — Test Suite</title>
<style>
body{font-family:monospace;background:#111;color:#eee;padding:20px;font-size:13px}
h1{color:#c9a84c;letter-spacing:.2em;font-size:14px}
.test{margin:8px 0;padding:8px 12px;border-radius:6px;background:#1a1a1a}
.ok{border-left:3px solid #0a7f2e;color:#4caf50}
.fail{border-left:3px solid #b00020;color:#f44336}
.pending{border-left:3px solid #c9a84c;color:#c9a84c}
.log{margin-top:4px;font-size:11px;color:#888;white-space:pre-wrap;max-height:200px;overflow-y:auto}
button{padding:8px 20px;background:#c9a84c;color:#111;border:none;border-radius:6px;cursor:pointer;font-family:monospace;font-weight:bold;margin:4px}
#results{margin-top:20px}
</style>
</head>
<body>
<h1>S T A R T  O N — TEST SUITE</h1>
<p style="color:#888;font-size:11px">Test automatici sul backend Vercel</p>

<button onclick="runAll()">▶ RUN ALL TESTS</button>
<button onclick="runAgents()">▶ TEST AGENTI</button>
<button onclick="testDocx()">▶ TEST DOCX</button>
<button onclick="clearResults()">✕ CLEAR</button>

<div id="results"></div>

<script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
<script>
const BACKEND = '/api/analyze';
const R = document.getElementById('results');

function log(id, status, msg, detail) {
  let el = document.getElementById(id);
  if (!el) {
    el = document.createElement('div');
    el.id = id;
    el.className = 'test pending';
    R.appendChild(el);
  }
  el.className = 'test ' + status;
  el.innerHTML = '<b>' + (status==='ok'?'✓':status==='fail'?'✗':'…') + ' ' + msg + '</b>' + (detail ? '<div class="log">' + detail + '</div>' : '');
}

async function callClaude(prompts) {
  const res = await fetch(BACKEND, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ai:'claude', prompts})
  });
  return res.json();
}

const AGENT_NAMES = ['A01 Valutatore Formale','A02 Analista Strategico','A03 Esperto Territoriale','A04 Devil Advocate'];
const s = 'PROGETTO: TestApp | SETTORE: SaaS | REGIONE: Puglia | INVESTIMENTO: 500000 | TRL: 6 | LOI: 5 | TEAM: 10 anni | CAPITAL: 30000 | DEMINIMIS: verificato';
const j = 'Rispondi SOLO con JSON valido. Nessun testo prima o dopo.';

const prompts = [
  `Sei un istruttore formale Invitalia specializzato in compliance.\n${s}\n\n${j}\n{"scoreON":75,"scoreSS":80,"sintesi":"analisi","puntiForza":["f1","f2"],"puntiDeboli":["d1"],"redFlags":["r1"]}`,
  `Sei un analista strategico di startup. Valuta business case.\n${s}\n\n${j}\n{"scoreON":72,"scoreSS":78,"sintesi":"analisi","puntiForza":["f1"],"puntiDeboli":["d1"]}`,
  `Sei un esperto di sviluppo territoriale italiano.\n${s}\n\n${j}\n{"scoreON":65,"scoreSS":70,"sintesi":"analisi","puntiForza":["f1"],"puntiDeboli":["d1"],"opportunita":["o1"]}`,
  `Sei un devil advocate severo. Trova criticita bloccanti.\n${s}\n\n${j}\n{"scoreON":55,"scoreSS":60,"sintesi":"critiche","critiche":["c1","c2","c3"],"puntiForza":["f1"],"puntiDeboli":["d1"]}`
];

async function runAgents() {
  log('agent-start', 'pending', 'Test agenti in corso...');
  
  try {
    const start = Date.now();
    const data = await callClaude(prompts);
    const elapsed = ((Date.now()-start)/1000).toFixed(1);
    
    if (!data.results) {
      log('agent-start', 'fail', 'Nessun results nel response', JSON.stringify(data).substring(0,200));
      return;
    }
    
    log('agent-start', 'ok', `Risposta ricevuta in ${elapsed}s`);
    
    data.results.forEach((r, i) => {
      const name = AGENT_NAMES[i];
      const ok = r && r.sintesi && r.sintesi !== 'Analisi non disponibile per questo provider.';
      const detail = `scoreON:${r?.scoreON} | scoreSS:${r?.scoreSS}\nsintesi: ${(r?.sintesi||'VUOTA').substring(0,100)}\ncampi: ${Object.keys(r||{}).join(', ')}`;
      log('agent-'+i, ok?'ok':'fail', name + (ok?' ✓':' ✗ VUOTO'), detail);
    });
    
    const passed = data.results.filter(r => r?.sintesi && r.sintesi !== 'Analisi non disponibile per questo provider.').length;
    log('agent-summary', passed===4?'ok':'fail', `Totale: ${passed}/4 agenti popolati`);
    
  } catch(e) {
    log('agent-start', 'fail', 'Errore: ' + e.message);
  }
}

async function testDocx() {
  log('docx-test', 'pending', 'Test libreria docx...');
  try {
    if (!window.docx) throw new Error('window.docx non definito');
    const { Document, Packer, Paragraph, TextRun } = window.docx;
    const doc = new Document({
      sections: [{ children: [new Paragraph({ children: [new TextRun('Test OK')] })] }]
    });
    const buf = await Packer.toBuffer(doc);
    log('docx-test', 'ok', `docx OK — buffer: ${buf.length} bytes`);
    
    // Test download
    const blob = new Blob([buf], {type:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'test.docx';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 1000);
    log('docx-download', 'ok', 'Download avviato');
  } catch(e) {
    log('docx-test', 'fail', 'docx ERRORE: ' + e.message);
  }
}

async function testGPT() {
  log('gpt-test', 'pending', 'Test GPT...');
  try {
    const data = await fetch(BACKEND, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ai:'gpt',prompts:['Rispondi con JSON: {"score":42,"ok":true}']})}).then(r=>r.json());
    const ok = data.results?.[0]?.score || data.results?.[0];
    log('gpt-test', ok?'ok':'fail', 'GPT: ' + (ok?'OK':'FALLITO'), JSON.stringify(data.results?.[0]).substring(0,100));
  } catch(e) {
    log('gpt-test', 'fail', 'GPT errore: ' + e.message);
  }
}

async function testGrok() {
  log('grok-test', 'pending', 'Test Grok...');
  try {
    const data = await fetch(BACKEND, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ai:'grok',prompts:['Rispondi con JSON: {"score":42,"ok":true}']})}).then(r=>r.json());
    const ok = data.results?.[0];
    log('grok-test', ok?'ok':'fail', 'Grok: ' + (ok?'OK':'FALLITO'), JSON.stringify(data.results?.[0]).substring(0,100));
  } catch(e) {
    log('grok-test', 'fail', 'Grok errore: ' + e.message);
  }
}

async function runAll() {
  R.innerHTML = '';
  await testDocx();
  await runAgents();
  await testGPT();
  await testGrok();
}

function clearResults() { R.innerHTML = ''; }
</script>
</body>
</html>
